[build]
  publish = "."
  functions = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[redirects]]
  from = "/api/settlements"
  to = "/.netlify/functions/settlements"
  status = 200

[[redirects]]
  from = "/api/save-settlements"
  to = "/.netlify/functions/save-settlements"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
