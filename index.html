<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nat Gas Forward Curve</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 30px 20px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: #58a6ff;
      letter-spacing: 0.5px;
    }
    .subtitle {
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 30px;
    }
    .chart-wrap {
      width: 100%;
      max-width: 820px;
      background: #161b22;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    canvas { width: 100% !important; }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: #8b949e;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    .status {
      margin-top: 18px;
      font-size: 0.75rem;
      color: #8b949e;
    }
    .status span { color: #3fb950; }
  </style>
</head>
<body>
  <h1>Henry Hub Natural Gas — Forward Curve</h1>
  <div class="subtitle">Trailing 10-day settlement animation · Updates daily</div>
  <div class="chart-wrap">
    <canvas id="chart" height="420"></canvas>
    <div class="legend" id="legend"></div>
    <div class="status">Last updated: <span id="updated">—</span></div>
  </div>

  <script>
    const COLORS = [
      '#1f4e8c','#2563a8','#2d7dd2','#3a9bd5',
      '#48c0d9','#56d4c0','#64e8a0','#7cf07a',
      '#a8f05a','#d4f040'
    ];

    async function loadData() {
      const res = await fetch('/api/settlements');
      const data = await res.json();
      return data;
    }

    function buildChart(data) {
      const ctx = document.getElementById('chart').getContext('2d');
      const labels = data.contracts;
      const days = data.days; // [{date, prices}]

      const datasets = days.map((day, i) => ({
        label: day.date,
        data: day.prices,
        borderColor: COLORS[i % COLORS.length],
        backgroundColor: 'transparent',
        borderWidth: i === days.length - 1 ? 3 : 1.5,
        pointRadius: i === days.length - 1 ? 5 : 3,
        tension: 0.4,
      }));

      const chart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          animation: { duration: 0 },
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: {
              ticks: { color: '#8b949e' },
              grid: { color: '#21262d' }
            },
            y: {
              ticks: { color: '#8b949e', callback: v => '$' + v.toFixed(3) },
              grid: { color: '#21262d' }
            }
          }
        }
      });

      // Animate: draw one curve at a time
      datasets.forEach((_, i) => {
        chart.data.datasets.forEach((ds, j) => {
          ds.borderWidth = 0;
          ds.pointRadius = 0;
        });
        chart.update('none');
      });

      let i = 0;
      function drawNext() {
        if (i >= datasets.length) return;
        chart.data.datasets[i].borderWidth = i === datasets.length - 1 ? 3 : 1.5;
        chart.data.datasets[i].pointRadius = i === datasets.length - 1 ? 5 : 3;
        chart.update();
        i++;
        setTimeout(drawNext, 600);
      }
      drawNext();

      // Legend
      const legend = document.getElementById('legend');
      days.forEach((day, i) => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<div class="legend-dot" style="background:${COLORS[i % COLORS.length]}"></div>${day.date}`;
        legend.appendChild(item);
      });

      document.getElementById('updated').textContent = days[days.length - 1].date;
    }

    loadData().then(buildChart).catch(e => {
      document.body.innerHTML += `<p style="color:red;margin-top:20px">Error loading data: ${e.message}</p>`;
    });
  </script>
</body>
</html>
