<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nat Gas Forward Curve</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 30px 20px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: #58a6ff;
      letter-spacing: 0.5px;
    }
    .subtitle {
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 30px;
    }
    .chart-wrap {
      width: 100%;
      max-width: 820px;
      background: #161b22;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    canvas { width: 100% !important; }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: #8b949e;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    .status {
      margin-top: 18px;
      font-size: 0.75rem;
      color: #8b949e;
    }
    .status span { color: #3fb950; }
    .replay-btn {
      margin-top: 16px;
      padding: 8px 20px;
      background: #21262d;
      color: #58a6ff;
      border: 1px solid #30363d;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .replay-btn:hover { background: #30363d; }
    .no-data {
      color: #8b949e;
      text-align: center;
      padding: 60px 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>Henry Hub Natural Gas — Forward Curve</h1>
  <div class="subtitle">Trailing 10-day settlement animation · Updates daily</div>
  <div class="chart-wrap">
    <canvas id="chart" height="420"></canvas>
    <div class="legend" id="legend"></div>
    <div style="text-align:center">
      <button class="replay-btn" id="replayBtn" onclick="startAnimation()" style="display:none">↺ Replay</button>
    </div>
    <div class="status">Last updated: <span id="updated">—</span></div>
  </div>

  <script>
    const COLORS = [
      '#1a3a6b','#1f4e8c','#2563a8','#2d7dd2',
      '#3a9bd5','#48c0d9','#56d4c0','#64e8a0',
      '#a8f05a','#d4f040'
    ];

    let chart = null;
    let allDatasets = [];

    async function loadData() {
      const res = await fetch('/api/settlements');
      const data = await res.json();
      return data;
    }

    function buildChart(data) {
      if (!data.days || data.days.length === 0) {
        document.getElementById('chart').style.display = 'none';
        document.querySelector('.chart-wrap').innerHTML += '<div class="no-data">No data yet — add settlements via the admin page.</div>';
        return;
      }

      const ctx = document.getElementById('chart').getContext('2d');
      const labels = data.contracts;
      const days = data.days;

      // Build datasets — all hidden initially
      allDatasets = days.map((day, i) => ({
        label: day.date,
        data: day.prices,
        borderColor: COLORS[i % COLORS.length],
        backgroundColor: 'transparent',
        borderWidth: 0,
        pointRadius: 0,
        tension: 0.4,
      }));

      chart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets: JSON.parse(JSON.stringify(allDatasets)) },
        options: {
          responsive: true,
          animation: { duration: 800, easing: 'easeInOutQuart' },
          plugins: { legend: { display: false } },
          scales: {
            x: {
              ticks: { color: '#8b949e' },
              grid: { color: '#21262d' }
            },
            y: {
              ticks: {
                color: '#8b949e',
                callback: v => v.toFixed(3)
              },
              grid: { color: '#21262d' }
            }
          }
        }
      });

      // Build legend
      const legend = document.getElementById('legend');
      days.forEach((day, i) => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<div class="legend-dot" style="background:${COLORS[i % COLORS.length]}"></div>${day.date}`;
        legend.appendChild(item);
      });

      document.getElementById('updated').textContent = days[days.length - 1].date;
      document.getElementById('replayBtn').style.display = 'inline-block';

      startAnimation();
    }

    function startAnimation() {
      if (!chart) return;
      const days = chart.data.datasets.length;

      // Hide all
      chart.data.datasets.forEach((ds, i) => {
        ds.borderWidth = 0;
        ds.pointRadius = 0;
      });
      chart.update('none');

      let i = 0;
      function showNext() {
        if (i >= days) return;
        const isLast = i === days - 1;
        chart.data.datasets[i].borderWidth = isLast ? 3 : 1.5;
        chart.data.datasets[i].pointRadius = isLast ? 5 : 3;
        chart.update();
        i++;
        if (i < days) setTimeout(showNext, 800);
      }
      showNext();
    }

    loadData()
      .then(buildChart)
      .catch(e => {
        document.querySelector('.chart-wrap').innerHTML += `<p style="color:#f85149;margin-top:20px;text-align:center">Error loading data: ${e.message}</p>`;
      });
  </script>
</body>
</html>
