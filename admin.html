<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nat Gas Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    h1 { color: #58a6ff; margin-bottom: 6px; font-size: 1.3rem; }
    .subtitle { color: #8b949e; font-size: 0.8rem; margin-bottom: 30px; }
    .card {
      background: #161b22;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    label { display: block; font-size: 0.8rem; color: #8b949e; margin-bottom: 6px; margin-top: 16px; }
    input, textarea {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      padding: 10px 12px;
      font-size: 0.9rem;
      font-family: inherit;
    }
    textarea { height: 220px; resize: vertical; }
    input:focus, textarea:focus { outline: none; border-color: #58a6ff; }
    .contracts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      margin-bottom: 8px;
    }
    .contract-label {
      font-size: 0.72rem;
      color: #58a6ff;
      background: #0d1117;
      border-radius: 4px;
      padding: 2px 8px;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #2ea043; }
    button:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
    .msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
    }
    .msg.success { background: #0f2b1a; color: #3fb950; border: 1px solid #238636; display: block; }
    .msg.error { background: #2d1b1b; color: #f85149; border: 1px solid #6e1717; display: block; }
    .hint { font-size: 0.75rem; color: #8b949e; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>Nat Gas Settlements Admin</h1>
  <div class="subtitle">Paste today's prices — one per line</div>

  <div class="card">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password"/>

    <label>Date</label>
    <input type="date" id="date"/>

    <label>Prices (one per line, in this order):</label>
    <div class="contracts" id="contractLabels"></div>
    <textarea id="prices" placeholder="2.887&#10;3.035&#10;3.293&#10;3.377&#10;3.354&#10;3.419&#10;3.749&#10;4.628&#10;5.107&#10;4.555&#10;3.586"></textarea>
    <div class="hint">Paste 11 prices, one per line. Order: K26, M26, N26, Q26, U26, V26, X26, Z26, F27, G27, H27</div>

    <button id="submitBtn" onclick="submit()">Save Settlement</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const CONTRACTS = ['K26','M26','N26','Q26','U26','V26','X26','Z26','F27','G27','H27'];

    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth()+1).padStart(2,'0');
    const dd = String(today.getDate()).padStart(2,'0');
    document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;

    const labelsEl = document.getElementById('contractLabels');
    CONTRACTS.forEach((c,i) => {
      const el = document.createElement('div');
      el.className = 'contract-label';
      el.textContent = `${i+1}. ${c}`;
      labelsEl.appendChild(el);
    });

    async function submit() {
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('msg');
      msg.className = 'msg';
      msg.textContent = '';

      const password = document.getElementById('password').value.trim();
      const date = document.getElementById('date').value;
      const priceLines = document.getElementById('prices').value.trim().split('\n').map(l => l.trim()).filter(Boolean);

      if (!password) return showMsg('error', 'Please enter the password.');
      if (!date) return showMsg('error', 'Please select a date.');
      if (priceLines.length !== CONTRACTS.length) {
        return showMsg('error', `Need exactly ${CONTRACTS.length} prices, got ${priceLines.length}.`);
      }

      const prices = priceLines.map(Number);
      if (prices.some(isNaN)) return showMsg('error', 'All prices must be numbers.');

      btn.disabled = true;
      btn.textContent = 'Saving...';

      try {
        const res = await fetch('/api/save-settlements', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, date, prices })
        });
        const data = await res.json();
        if (data.success) {
          showMsg('success', `✓ Saved! You now have ${data.days} day(s) stored. View the chart at the main page.`);
          document.getElementById('prices').value = '';
        } else {
          showMsg('error', data.error || 'Something went wrong.');
        }
      } catch(e) {
        showMsg('error', 'Network error: ' + e.message);
      }

      btn.disabled = false;
      btn.textContent = 'Save Settlement';
    }

    function showMsg(type, text) {
      const msg = document.getElementById('msg');
      msg.className = 'msg ' + type;
      msg.textContent = text;
    }
  </script>
</body>
</html>
